<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hilton Objection Flashcards</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #38bdf8;
      --accent-2: #facc15;
      --border: #334155;
      --good: #22c55e;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #020617 0%, #0f172a 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      background: rgba(17, 24, 39, 0.9);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      line-height: 1.2;
    }

    .sub {
      color: var(--muted);
      margin-bottom: 18px;
      line-height: 1.5;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1.4fr 1fr auto auto;
      gap: 12px;
      margin-top: 16px;
    }

    input, select, button {
      border-radius: 14px;
      border: 1px solid var(--border);
      padding: 12px 14px;
      font-size: 1rem;
    }

    input, select {
      background: #0b1220;
      color: var(--text);
    }

    button {
      background: var(--accent);
      color: #082f49;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover { transform: translateY(-1px); }
    button.secondary {
      background: var(--panel-2);
      color: var(--text);
    }

    .stats {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .pill {
      background: rgba(56, 189, 248, 0.12);
      color: #bae6fd;
      border: 1px solid rgba(56, 189, 248, 0.28);
      border-radius: 999px;
      padding: 6px 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin-top: 18px;
    }

    .card {
      perspective: 1200px;
      min-height: 240px;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 240px;
      transition: transform 0.5s ease;
      transform-style: preserve-3d;
      cursor: pointer;
    }

    .card.flipped .card-inner { transform: rotateY(180deg); }

    .face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      background: rgba(17, 24, 39, 0.96);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.22);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .back {
      transform: rotateY(180deg);
      background: rgba(15, 23, 42, 0.98);
    }

    .stage {
      display: inline-block;
      font-size: 0.8rem;
      letter-spacing: 0.02em;
      padding: 6px 10px;
      border-radius: 999px;
      margin-bottom: 12px;
      width: fit-content;
    }

    .stage.stage1 { background: rgba(239, 68, 68, 0.14); color: #fecaca; border: 1px solid rgba(239, 68, 68, 0.25); }
    .stage.stage2 { background: rgba(250, 204, 21, 0.14); color: #fde68a; border: 1px solid rgba(250, 204, 21, 0.25); }
    .stage.stage3 { background: rgba(34, 197, 94, 0.14); color: #bbf7d0; border: 1px solid rgba(34, 197, 94, 0.25); }
    .stage.tool { background: rgba(148, 163, 184, 0.14); color: #e2e8f0; border: 1px solid rgba(148, 163, 184, 0.25); }

    .front-title {
      font-size: 1.2rem;
      font-weight: 800;
      line-height: 1.35;
    }

    .back-text {
      color: var(--text);
      line-height: 1.6;
      font-size: 1rem;
      white-space: pre-line;
    }

    .hint {
      color: var(--muted);
      font-size: 0.88rem;
      margin-top: 12px;
    }

    .footer-actions {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .small {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .copy-status {
      color: var(--good);
      font-weight: 700;
      min-height: 1em;
    }

    @media (max-width: 800px) {
      .toolbar {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Hilton Objection Flashcards</h1>
      <div class="sub">Click any card to flip it. Filter by stage, search by objection, and copy the deck as Anki TSV.</div>

      <div class="toolbar">
        <input id="search" type="text" placeholder="Search objections or responses..." />
        <select id="stageFilter">
          <option value="all">All stages</option>
          <option value="stage1">Stage 1 · Early / Reflex</option>
          <option value="stage2">Stage 2 · Mid-call</option>
          <option value="stage3">Stage 3 · Late / Buying</option>
          <option value="tool">Control / Tool</option>
        </select>
        <button id="flipAllBtn" class="secondary">Flip Visible</button>
        <button id="copyTsvBtn">Copy Anki TSV</button>
      </div>

      <div class="stats">
        <span class="pill" id="countPill">0 cards</span>
        <span class="pill">Front = objection header</span>
        <span class="pill">Back = what to say</span>
      </div>
      <div class="footer-actions">
        <div class="small">Tip: keep only the headers on the front, then memorize the exact responses on the back.</div>
        <div class="copy-status" id="copyStatus"></div>
      </div>
    </section>

    <section class="grid" id="cardsGrid"></section>
  </div>

  <script>
    const cards = [
      {
        stage: 'stage1',
        stageLabel: 'Stage 1 · Early / Reflex',
        front: 'I’M BUSY / I’M AT WORK / DON’T HAVE TIME TO TALK / IN A MEETING /',
        back: 'I know your time is valuable; I will be brief. (CONTINUE)'
      },
      {
        stage: 'stage1',
        stageLabel: 'Stage 1 · Early / Reflex',
        front: 'CALL ME BACK',
        back: 'Since these are live offers, we can only guarantee them on this call. The promotions are subject to change and do so frequently. (CONTINUE)'
      },
      {
        stage: 'stage1',
        stageLabel: 'Stage 1 · Early / Reflex',
        front: 'NOT INTERESTED',
        back: 'Let me at least go over the details of the promotion, so you have an idea of what we are offering today.\n\nThat’s fine, every guest I speak with says the same thing as well. Until they hear what I can really do for them. (CONTINUE)'
      },
      {
        stage: 'stage1',
        stageLabel: 'Stage 1 · Early / Reflex',
        front: 'WHY WAS I TRANSFERRED TO YOU / I WAS BOOKING',
        back: 'Reservations transferred you over so you can get 500 Hilton Honors Points just for listening to a special offer. I promise I will make it brief. (CONTINUE)'
      },
      {
        stage: 'stage1',
        stageLabel: 'Stage 1 · Early / Reflex',
        front: 'I THOUGHT THIS WAS A SURVEY',
        back: 'The good news is that you were transferred to receive 500 Hilton Honors points just for listening to a special offer. If you hold the line at the end of the call, you can still participate in the survey regarding your experience with reservations. (CONTINUE)'
      },
      {
        stage: 'stage2',
        stageLabel: 'Stage 2 · Mid-call',
        front: 'CAN YOU JUST SEND ME AN EMAIL?',
        back: 'We treat this like any other reservation made with Hilton; you can expect an email confirmation once you secure the promotional rate. (CONTINUE)'
      },
      {
        stage: 'stage2',
        stageLabel: 'Stage 2 · Mid-call',
        front: 'HOW MUCH IS 500 POINTS WORTH?',
        back: 'At least a few minutes of your time, I promise I will be brief! (CONTINUE)'
      },
      {
        stage: 'stage2',
        stageLabel: 'Stage 2 · Mid-call',
        front: 'NOT PLANNING A VACATION TODAY',
        back: 'That’s perfect you’re not booking any dates with me today. (CONTINUE)'
      },
      {
        stage: 'stage2',
        stageLabel: 'Stage 2 · Mid-call',
        front: 'NO TIME TO TRAVEL',
        back: 'That’s the best part, you don’t have to travel right away. (CONTINUE)\n\nThat’s okay, we design these packages with guests just like you in mind. (CONTINUE)'
      },
      {
        stage: 'stage3',
        stageLabel: 'Stage 3 · Late / Buying',
        front: 'HOW MUCH IS THIS GOING TO COST ME?',
        back: 'You are going to love this, because the price I will break down is going to be deeply discounted because of the offer today. (CONTINUE)'
      },
      {
        stage: 'stage3',
        stageLabel: 'Stage 3 · Late / Buying',
        front: 'DO I HAVE TO PAY TODAY?',
        back: 'Yes, but only if you love the tremendous value and flexibility of the promotion! (CONTINUE)'
      },
      {
        stage: 'stage3',
        stageLabel: 'Stage 3 · Late / Buying',
        front: 'IS THIS TIMESHARE?',
        back: 'Absolutely! It’s Hilton’s version of vacation ownership you’re going to love it. (CONTINUE)'
      },
      {
        stage: 'tool',
        stageLabel: 'Control / Tool',
        front: 'DEFLECTION',
        back: 'I will see what I can do for you at the end of this call. (CONTINUE)'
      },
      {
        stage: 'tool',
        stageLabel: 'Control / Tool',
        front: 'LAST RESORT',
        back: 'After we go through where the details, you get the 500 points for listening, and I will see what extra perks and incentives that I can include in the package. We have some great gifts we can add to encourage our members to travel.'
      }
    ];

    const grid = document.getElementById('cardsGrid');
    const search = document.getElementById('search');
    const stageFilter = document.getElementById('stageFilter');
    const countPill = document.getElementById('countPill');
    const flipAllBtn = document.getElementById('flipAllBtn');
    const copyTsvBtn = document.getElementById('copyTsvBtn');
    const copyStatus = document.getElementById('copyStatus');

    function escapeHtml(text) {
      return text
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function getVisibleCards() {
      const term = search.value.trim().toLowerCase();
      const stage = stageFilter.value;
      return cards.filter(card => {
        const matchesStage = stage === 'all' || card.stage === stage;
        const hay = (card.front + ' ' + card.back).toLowerCase();
        const matchesTerm = !term || hay.includes(term);
        return matchesStage && matchesTerm;
      });
    }

    function render() {
      const visible = getVisibleCards();
      grid.innerHTML = visible.map((card, idx) => `
        <article class="card" data-index="${idx}">
          <div class="card-inner">
            <div class="face front">
              <div>
                <div class="stage ${card.stage}">${card.stageLabel}</div>
                <div class="front-title">${escapeHtml(card.front)}</div>
              </div>
              <div class="hint">Click to flip</div>
            </div>
            <div class="face back">
              <div>
                <div class="stage ${card.stage}">${card.stageLabel}</div>
                <div class="back-text">${escapeHtml(card.back)}</div>
              </div>
              <div class="hint">Click to return</div>
            </div>
          </div>
        </article>
      `).join('');

      countPill.textContent = `${visible.length} card${visible.length === 1 ? '' : 's'}`;

      document.querySelectorAll('.card').forEach(cardEl => {
        cardEl.addEventListener('click', () => cardEl.classList.toggle('flipped'));
      });
    }

    function buildTsv() {
      return cards.map(card => {
        const front = `<div style="text-align:left;"><b>${card.front}</b></div>`;
        const back = `<div style="text-align:left;">${card.back.replaceAll('\n\n', '<br><br>').replaceAll('\n', '<br>')}</div>`;
        return `${front}\t${back}`;
      }).join('\n');
    }

    search.addEventListener('input', render);
    stageFilter.addEventListener('change', render);

    flipAllBtn.addEventListener('click', () => {
      document.querySelectorAll('.card').forEach(cardEl => cardEl.classList.toggle('flipped'));
    });

    copyTsvBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(buildTsv());
        copyStatus.textContent = 'Anki TSV copied.';
        setTimeout(() => copyStatus.textContent = '', 2200);
      } catch {
        copyStatus.textContent = 'Clipboard copy failed.';
        setTimeout(() => copyStatus.textContent = '', 2200);
      }
    });

    render();
  </script>
</body>
</html>
